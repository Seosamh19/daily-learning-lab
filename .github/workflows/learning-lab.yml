name: Daily Learning Lab

on:
  schedule:
    # Daily at 07:47 UTC (08:47 IST) — every morning during working hours
    - cron: '47 7 * * *'
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate today's post
        run: python generate_post.py

      - name: Commit and push new post
        run: |
          git config user.name "Learning Lab Bot"
          git config user.email "bot@users.noreply.github.com"
          git add _posts/ data/used.json
          git commit -m "Add Daily Learning Lab post for $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push
